    id: content
    attributes:
      label: Epic Description
      description: "Include summary, goal, scope, metrics impact, sub-issues, and definition of done."
      placeholder: "Summary...\nGoal...\nScope (in/out)...\nMetrics...\nSub-issues...\nDoD..."
    validations:
      required: true
